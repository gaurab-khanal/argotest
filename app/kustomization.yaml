apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: argocd-test
  annotations:
    config.kubernetes.io/local-config: "true"
resources:
  - ./serviceaccount.yaml

patches:
  - patch: |-
       apiVersion: v1
       kind: ServiceAccount
       metadata:
         name: demo-sa
         annotations:
           my-custom-annotation.foo/bar: baz
    target:
      kind: ServiceAccount
      name: demo-sa
