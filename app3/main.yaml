apiVersion: v1
kind: Namespace
metadata:
  name: nginx-synced
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment-synced
  namespace: nginx-synced
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-synced
  template:
    metadata:
      labels:
        app: nginx-synced
    spec:
      containers:
        - name: nginx
          image: nginx:1.29
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service-synced
  namespace: nginx-synced
spec:
  selector:
    app: nginx-synced
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: nginx-gateway
  namespace: nginx-synced
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: nginx.local
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-route
  namespace: nginx-synced
spec:
  parentRefs:
    - name: nginx-gateway
  hostnames:
    - nginx.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx-service-synced
          port: 80
