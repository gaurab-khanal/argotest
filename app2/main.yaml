apiVersion: v1
kind: Namespace
metadata:
  name: nginx-synced
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment-synced
  namespace: nginx-synced
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-synced
  template:
    metadata:
      labels:
        app: nginx-synced
    spec:
      containers:
        - name: nginx
          image: nginx:1.29
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service-synced
  namespace: nginx-synced
spec:
  selector:
    app: nginx-synced
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress-synced
  namespace: nginx-synced
spec:
  ingressClassName: nginx
  rules:
    - host: nginx.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service-synced
                port:
                  number: 80
